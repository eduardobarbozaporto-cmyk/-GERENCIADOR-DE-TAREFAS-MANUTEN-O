<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TMN — Gestão de Manutenção</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0c0e14;--bg2:#12151f;--bg3:#181d2a;--bg4:#1f2535;--bg5:#252d3e;
  --border:#252d3e;--border2:#2e3a50;--border3:#3a4760;
  --text:#e4eaf6;--text2:#8896b3;--text3:#4a5570;
  --accent:#4f7cff;--accent2:#3a5fd6;--acg:rgba(79,124,255,.15);
  --green:#22c77a;--gbg:rgba(34,199,122,.13);
  --amber:#f5a623;--abg:rgba(245,166,35,.13);
  --red:#ff4f6b;--rbg:rgba(255,79,107,.13);
  --purple:#a78bfa;--pbg:rgba(167,139,250,.13);
  --teal:#2dd4bf;--tbg:rgba(45,212,191,.13);
  --r:8px;--rsm:5px;--rlg:12px;
}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);font-size:13px}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border3);border-radius:2px}
.shell{display:flex;height:100vh;overflow:hidden}
.side{width:230px;min-width:230px;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.side-logo{padding:16px 14px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.logo-mark{width:32px;height:32px;background:linear-gradient(135deg,#4f7cff,#a78bfa);border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-text{font-size:15px;font-weight:700;letter-spacing:.5px}
.logo-sub{font-size:10px;color:var(--text3);margin-top:1px}
.side-scroll{flex:1;overflow-y:auto;padding:8px}
.s-lbl{font-size:9px;font-weight:700;color:var(--text3);letter-spacing:1px;padding:10px 8px 4px;text-transform:uppercase}
.nav{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:var(--rsm);cursor:pointer;color:var(--text2);transition:all .12s;position:relative;user-select:none}
.nav:hover{background:var(--bg3);color:var(--text)}
.nav.on{background:var(--acg);color:var(--accent);font-weight:500}
.nav.on::before{content:'';position:absolute;left:0;top:22%;height:56%;width:2px;background:var(--accent);border-radius:0 2px 2px 0}
.nav i{font-size:15px;width:16px;text-align:center;flex-shrink:0}
.nav span{flex:1;font-size:12px}
.nbadge{font-size:9px;font-weight:700;background:var(--red);color:#fff;padding:1px 5px;border-radius:10px;min-width:16px;text-align:center}
.nbadge.am{background:var(--amber)}.nbadge.gr{background:var(--green)}
.proj-row{display:flex;align-items:center;gap:7px;padding:6px 9px;border-radius:var(--rsm);cursor:pointer;color:var(--text2);transition:all .12s}
.proj-row:hover{background:var(--bg3);color:var(--text)}
.proj-row.on{color:var(--text)}
.pdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pname{flex:1;font-size:11px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pcnt{font-size:10px;color:var(--text3)}
.add-row{display:flex;align-items:center;gap:7px;padding:6px 9px;cursor:pointer;color:var(--text3);font-size:11px;border-radius:var(--rsm);transition:all .12s}
.add-row:hover{color:var(--accent);background:var(--acg)}
.side-foot{padding:10px 8px;border-top:1px solid var(--border)}
.user-chip{display:flex;align-items:center;gap:8px;padding:6px 8px;border-radius:var(--rsm)}
.ava{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,#4f7cff,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0}
.ava-sm{width:22px;height:22px;font-size:9px}
.un{font-size:12px;font-weight:500}.ur{font-size:10px;color:var(--text3)}
.topbar{background:var(--bg2);border-bottom:1px solid var(--border);padding:0 18px;display:flex;align-items:center;gap:10px;height:50px;flex-shrink:0}
.page-title{font-size:14px;font-weight:600;flex:1}
.search-wrap{display:flex;align-items:center;gap:6px;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:5px 10px;width:190px}
.search-wrap input{background:none;border:none;outline:none;color:var(--text);font-size:12px;width:100%;font-family:inherit}
.search-wrap input::placeholder{color:var(--text3)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 12px;border-radius:var(--rsm);border:1px solid var(--border2);background:var(--bg3);color:var(--text);font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap;user-select:none}
.btn:hover{background:var(--bg4)}
.btn.ac{background:var(--accent);border-color:var(--accent2);color:#fff}
.btn.ac:hover{background:var(--accent2)}
.btn.sm{padding:4px 9px;font-size:11px}
.vtog{display:flex;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);overflow:hidden}
.vt{padding:5px 9px;cursor:pointer;color:var(--text3);transition:all .12s;font-size:12px}
.vt:hover{color:var(--text)}.vt.on{background:var(--bg4);color:var(--text)}
.content{flex:1;overflow-y:auto;padding:16px 18px}
.board{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.col-hd{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.col-tt{font-size:11px;font-weight:600}
.col-cc{font-size:10px;color:var(--text3);background:var(--bg4);padding:1px 6px;border-radius:8px;margin-right:auto}
.col-add{color:var(--text3);cursor:pointer;font-size:15px;transition:color .12s}
.col-add:hover{color:var(--accent)}
.col-body{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:8px;min-height:180px}
.tc{background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);padding:10px 11px;margin-bottom:7px;cursor:pointer;transition:all .12s}
.tc:hover{border-color:var(--border3);background:var(--bg4)}
.tc.sel{border-color:var(--accent)}
.tc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:7px}
.tc-cb{width:14px;height:14px;border-radius:3px;border:1.5px solid var(--border3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.tc-cb:hover{border-color:var(--green)}
.tc-cb.dn{background:var(--green);border-color:var(--green)}
.tc-nm{flex:1;font-size:12px;font-weight:500;line-height:1.4}
.tc-nm.dn{text-decoration:line-through;color:var(--text3)}
.chip{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.4px}
.tc-meta{display:flex;align-items:center;gap:5px;flex-wrap:wrap}
.prio-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.pd-alta{background:var(--red)}.pd-media{background:var(--amber)}.pd-baixa{background:var(--green)}
.tc-date{display:flex;align-items:center;gap:2px;font-size:10px}
.dlate{color:var(--red)}.dsoon{color:var(--amber)}.dok{color:var(--text3)}.ddn{color:var(--green)}
.tc-proj-tag{display:flex;align-items:center;gap:3px;font-size:10px;color:var(--text2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tc-metas{display:flex;align-items:center;gap:4px;margin-left:auto}
.tc-meta-ic{font-size:10px;color:var(--text3);display:flex;align-items:center;gap:2px}
.lh{display:grid;grid-template-columns:1fr 80px 100px 85px 85px 30px;gap:8px;padding:5px 10px;font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);margin-bottom:2px}
.lr{display:grid;grid-template-columns:1fr 80px 100px 85px 85px 30px;gap:8px;align-items:center;padding:7px 10px;border-radius:var(--rsm);cursor:pointer;transition:background .12s}
.lr:hover{background:var(--bg2)}
.lr-nm{display:flex;align-items:center;gap:7px;font-size:12px;font-weight:500;min-width:0}
.lr-nm span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.gantt-wrap{overflow-x:auto;padding-bottom:4px}
.gantt-grid{min-width:900px}
.gantt-head{display:flex;margin-bottom:2px;padding-left:180px}
.gantt-month{flex:1;text-align:center;font-size:10px;font-weight:600;color:var(--text3);border-right:1px solid var(--border);padding:4px 0}
.gantt-row{display:flex;align-items:center;margin-bottom:4px;min-height:28px}
.gantt-lbl{width:180px;min-width:180px;font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-right:10px;cursor:pointer}
.gantt-lbl:hover{color:var(--text)}
.gantt-track{flex:1;background:var(--bg3);border-radius:3px;height:22px;position:relative;border:1px solid var(--border)}
.gantt-bar{position:absolute;height:100%;border-radius:3px;display:flex;align-items:center;padding-left:6px;font-size:9px;font-weight:600;color:rgba(255,255,255,.9);overflow:hidden;white-space:nowrap;cursor:pointer;transition:opacity .12s}
.gantt-bar:hover{opacity:.85}
.gantt-today{position:absolute;top:-2px;bottom:-2px;width:1.5px;background:var(--red);opacity:.7;z-index:2}
.detail{width:0;background:var(--bg2);border-left:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;transition:width .2s}
.detail.open{width:340px;min-width:340px}
.dh{padding:13px 15px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:8px}
.d-title{font-size:13px;font-weight:600;flex:1;line-height:1.4}
.dbody{flex:1;overflow-y:auto;padding:13px 15px}
.ds{margin-bottom:15px}
.dl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:8px}
.dr{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.drl{font-size:11px;color:var(--text2);width:85px;flex-shrink:0}
.drv{font-size:11px;font-weight:500}
.prog-bg{background:var(--bg4);border-radius:3px;height:4px;flex:1;overflow:hidden}
.prog-fg{height:100%;border-radius:3px;transition:width .3s}
.ssel{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:3px 6px;font-family:inherit;cursor:pointer;outline:none}
.ssel option{background:var(--bg3)}
.step-item{display:flex;align-items:flex-start;gap:8px;padding:7px 0;border-bottom:1px solid var(--border)}
.step-item:last-child{border-bottom:none}
.step-cb{width:15px;height:15px;border-radius:50%;border:1.5px solid var(--border3);flex-shrink:0;margin-top:1px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .12s}
.step-cb:hover{border-color:var(--green)}
.step-cb.dn{background:var(--green);border-color:var(--green)}
.step-txt{flex:1;font-size:11px;line-height:1.4}
.step-txt.dn{text-decoration:line-through;color:var(--text3)}
.step-del{color:var(--text3);cursor:pointer;font-size:12px;opacity:0;transition:opacity .12s}
.step-item:hover .step-del{opacity:1}
.assign-chip{display:flex;align-items:center;gap:4px;background:var(--acg);border:1px solid var(--accent);border-radius:20px;padding:3px 8px;font-size:10px;color:var(--accent);margin-bottom:6px}
.assign-chip .x{cursor:pointer;opacity:.6}.assign-chip .x:hover{opacity:1}
.at-input{background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-size:11px;padding:4px 8px;font-family:inherit;outline:none;width:100%}
.at-input:focus{border-color:var(--accent)}
.cmt{display:flex;gap:7px;margin-bottom:10px}
.cbubble{background:var(--bg3);border:1px solid var(--border);border-radius:0 var(--rsm) var(--rsm) var(--rsm);padding:7px 9px;flex:1}
.cname{font-size:10px;font-weight:600;color:var(--text2)}
.ctime{font-size:9px;color:var(--text3);margin-left:5px}
.ctxt{font-size:11px;margin-top:3px;line-height:1.5;color:var(--text)}
.cin-row{display:flex;gap:7px;align-items:flex-end;padding:11px 14px;border-top:1px solid var(--border)}
.cin-row textarea{flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:var(--rsm);color:var(--text);font-family:inherit;font-size:11px;padding:6px 8px;resize:none;min-height:32px;max-height:80px;outline:none;transition:border .12s}
.cin-row textarea:focus{border-color:var(--accent)}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:999;backdrop-filter:blur(2px)}
.ov.hid{display:none}
.modal{background:var(--bg2);border:1px solid var(--border2);border-radius:14px;padding:20px;width:500px;max-width:95vw;max-height:90vh;overflow-y:auto}
.mtt{font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.mtt .close{cursor:pointer;color:var(--text3)}
.fg{margin-bottom:12px}
.fl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px;display:block}
.fg input,.fg select,.fg textarea{width:100%;background:var(--bg3);border:1px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:inherit;font-size:12px;padding:7px 10px;outline:none;transition:border .12s}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--accent)}
.fg select option{background:var(--bg2)}
.fg textarea{resize:vertical;min-height:55px}
.fgr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mfoot{display:flex;justify-content:flex-end;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--border)}
.kpi-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px;margin-bottom:16px}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px}
.kpi-lbl{font-size:10px;color:var(--text2);margin-bottom:6px;display:flex;align-items:center;gap:4px}
.kpi-val{font-size:28px;font-weight:700;line-height:1;letter-spacing:-.5px}
.kpi-sub{font-size:10px;color:var(--text3);margin-top:3px}
.kv-g{color:var(--green)}.kv-a{color:var(--amber)}.kv-r{color:var(--red)}.kv-b{color:var(--accent)}
.ind-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:12px}
.ind-title{font-size:12px;font-weight:600;margin-bottom:10px}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.hbar-lbl{font-size:11px;color:var(--text2);width:120px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hbar-bg{flex:1;background:var(--bg4);border-radius:3px;height:7px;overflow:hidden}
.hbar-fg{height:100%;border-radius:3px;transition:width .5s}
.hbar-val{font-size:10px;color:var(--text3);width:35px;text-align:right;flex-shrink:0}
.donut-wrap{display:flex;align-items:center;gap:14px}
.donut-leg{flex:1}
.donut-li{display:flex;align-items:center;gap:6px;margin-bottom:6px;font-size:11px}
.donut-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.toast-area{position:fixed;bottom:16px;right:16px;z-index:2000;display:flex;flex-direction:column;gap:6px;pointer-events:none}
.toast{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:10px 14px;font-size:12px;color:var(--text);display:flex;align-items:center;gap:8px;min-width:240px;animation:tin .2s ease;pointer-events:none}
.toast.go{animation:tout .3s ease forwards}
@keyframes tin{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes tout{to{opacity:0;transform:translateY(8px)}}
.loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:9999;gap:12px}
.loader-spin{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.tag-impl{background:var(--acg);color:var(--accent)}
.tag-prev{background:var(--gbg);color:var(--green)}
.tag-corr{background:var(--rbg);color:var(--red)}
.tag-tpm{background:var(--pbg);color:var(--purple)}
.tag-kz{background:var(--abg);color:var(--amber)}
.tag-sens{background:var(--tbg);color:var(--teal)}
.empty{text-align:center;padding:40px 16px;color:var(--text3)}
.empty i{font-size:30px;margin-bottom:8px;display:block;opacity:.3}
</style>
</head>
<body>

<!-- LOADER -->
<div class="loader" id="loader">
  <div class="logo-mark" style="width:44px;height:44px;border-radius:12px;background:linear-gradient(135deg,#4f7cff,#a78bfa);display:flex;align-items:center;justify-content:center;margin-bottom:4px">
    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
      <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
    </svg>
  </div>
  <div style="font-size:16px;font-weight:700;color:var(--text)">TMN</div>
  <div class="loader-spin"></div>
  <div style="font-size:11px;color:var(--text3)">Conectando ao banco de dados...</div>
</div>

<div class="shell" id="app" style="display:none">
<!-- SIDEBAR -->
<div class="side">
  <div class="side-logo">
    <div class="logo-mark">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round">
        <path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/>
      </svg>
    </div>
    <div><div class="logo-text">TMN</div><div class="logo-sub">Gestão de Manutenção</div></div>
  </div>
  <div class="side-scroll">
    <div class="s-lbl">Menu</div>
    <div class="nav on" id="n-inbox" onclick="go('inbox')"><i class="ti ti-inbox"></i><span>Caixa de entrada</span><span class="nbadge" id="b-inbox">0</span></div>
    <div class="nav" id="n-hoje" onclick="go('hoje')"><i class="ti ti-sun"></i><span>Hoje</span><span class="nbadge am" id="b-hoje" style="display:none">0</span></div>
    <div class="nav" id="n-atras" onclick="go('atras')"><i class="ti ti-alert-circle"></i><span>Atrasadas</span><span class="nbadge" id="b-atras" style="display:none">0</span></div>
    <div class="nav" id="n-gantt" onclick="go('gantt')"><i class="ti ti-timeline"></i><span>Cronograma anual</span></div>
    <div class="nav" id="n-kpi" onclick="go('kpi')"><i class="ti ti-chart-bar"></i><span>Indicadores</span></div>
    <div class="nav" id="n-done" onclick="go('done')"><i class="ti ti-circle-check"></i><span>Concluídas</span><span class="nbadge gr" id="b-done">0</span></div>
    <div class="s-lbl" style="margin-top:4px">Projetos</div>
    <div id="side-projs"></div>
    <div class="add-row" onclick="openMod('proj')"><i class="ti ti-plus"></i> Novo projeto</div>
  </div>
  <div class="side-foot">
    <div class="user-chip">
      <div class="ava">EP</div>
      <div><div class="un">Eduardo Porto</div><div class="ur">Sup. Manutenção</div></div>
    </div>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar">
    <div class="page-title" id="pg-title">Caixa de entrada</div>
    <div class="search-wrap"><i class="ti ti-search" style="font-size:13px;color:var(--text3)"></i><input placeholder="Buscar..." oninput="doSearch(this.value)"></div>
    <div class="vtog" id="vtog">
      <div class="vt on" id="vt-b" onclick="setLay('board')"><i class="ti ti-layout-columns"></i></div>
      <div class="vt" id="vt-l" onclick="setLay('list')"><i class="ti ti-list"></i></div>
    </div>
    <button class="btn ac" onclick="openMod('task')"><i class="ti ti-plus"></i> Nova tarefa</button>
  </div>
  <div style="display:flex;flex:1;overflow:hidden">
    <div class="content" id="content"></div>
    <div class="detail" id="dp">
      <div class="dh">
        <div class="d-title" id="d-title">—</div>
        <span onclick="closeDP()" style="cursor:pointer;color:var(--text3);font-size:16px"><i class="ti ti-x"></i></span>
      </div>
      <div class="dbody" id="d-body"></div>
      <div class="cin-row">

<script>
const SUPABASE_URL = 'https://hsyjdvniuhjtcruiedzg.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImhzeWpkdm5pdWhqdGNydWllZHpnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODE1OTUyNjgsImV4cCI6MjA5NzE3MTI2OH0.nyzbaLhxVmCny7LKsB8b49-dWhlh7F6Q0QHfj0zJgC4';
const sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const $ = id => document.getElementById(id);
const today = new Date().toISOString().split('T')[0];
const D = n => { let d=new Date(); d.setDate(d.getDate()+n); return d.toISOString().split('T')[0]; };
const BR = s => { if(!s) return '—'; const [y,m,dd]=s.split('-'); return `${dd}/${m}/${y}`; };
const isLate = s => s && s < today;
const isSoon = s => { if(!s) return false; return s >= today && s <= D(5); };
const fmt$ = n => n ? `R$ ${Number(n).toLocaleString('pt-BR',{minimumFractionDigits:2})}` : '—';

const PCOLS=['#4f7cff','#22c77a','#f5a623','#a78bfa','#2dd4bf','#f472b6','#fb923c'];
const TMAP={impl:{l:'Implantação',c:'tag-impl'},prev:{l:'Preventiva',c:'tag-prev'},corr:{l:'Corretiva',c:'tag-corr'},tpm:{l:'TPM',c:'tag-tpm'},kz:{l:'Kaizen',c:'tag-kz'},sens:{l:'Sensitiva',c:'tag-sens'}};
const COLS=['A fazer','Em andamento','Concluído'];
const CDOTS=['var(--text3)','var(--accent)','var(--green)'];

let projs=[], tasks=[], etapas=[], comentarios=[];
let selId=null, curV='inbox', curLay='board', curPrj=null, srch='';
let modalStepsList=[];

// ─── LOAD DATA ───
async function loadAll() {
  try {
    const [rp, rt, re, rc] = await Promise.all([
      sb.from('projetos').select('*').order('created_at'),
      sb.from('tarefas').select('*').order('created_at'),
      sb.from('etapas').select('*').order('ordem'),
      sb.from('comentarios').select('*').order('created_at'),
    ]);
    projs  = rp.data || [];
    tasks  = rt.data || [];
    etapas = re.data || [];
    comentarios = rc.data || [];
    $('loader').style.display='none';
    $('app').style.display='flex';
    render();
  } catch(e) {
    $('loader').innerHTML='<div style="color:var(--red);font-size:13px;text-align:center;padding:20px">Erro ao conectar.<br><small>Verifique a URL do Supabase.</small></div>';
  }
}

function taskSteps(tid)  { return etapas.filter(e=>e.tarefa_id===tid).sort((a,b)=>a.ordem-b.ordem); }
function taskCmts(tid)   { return comentarios.filter(c=>c.tarefa_id===tid).sort((a,b)=>new Date(a.created_at)-new Date(b.created_at)); }
function projColor(pid)  { const p=projs.find(x=>x.id===pid); return p?p.col:'var(--text3)'; }
function projName(pid)   { const p=projs.find(x=>x.id===pid); return p?p.nm:''; }

// ─── FILTERS ───
function getFiltered() {
  let list=[...tasks];
  if(srch) list=list.filter(t=>t.nm.toLowerCase().includes(srch.toLowerCase()));
  if(curV==='hoje')  list=list.filter(t=>t.dt===today);
  else if(curV==='atras') list=list.filter(t=>t.st!=='Concluído'&&isLate(t.dt));
  else if(curV==='done')  list=list.filter(t=>t.st==='Concluído');
  else if(curV==='prj')   list=list.filter(t=>t.pj===curPrj);
  else list=list.filter(t=>t.st!=='Concluído');
  return list;
}

// ─── RENDER ───
function render() {
  updateBadges(); renderSideProjs();
  if(curV==='gantt'){renderGantt();return;}
  if(curV==='kpi'){renderKPI();return;}
  curLay==='board'?renderBoard():renderList();
}

function updateBadges() {
  const open=tasks.filter(t=>t.st!=='Concluído');
  $('b-inbox').textContent=open.length;
  const late=open.filter(t=>isLate(t.dt)).length;
  $('b-atras').textContent=late; $('b-atras').style.display=late?'':'none';
  const tod=open.filter(t=>t.dt===today).length;
  $('b-hoje').textContent=tod; $('b-hoje').style.display=tod?'':'none';
  $('b-done').textContent=tasks.filter(t=>t.st==='Concluído').length;
}

function renderSideProjs() {
  $('side-projs').innerHTML=projs.map(p=>{
    const cnt=tasks.filter(t=>t.pj===p.id&&t.st!=='Concluído').length;
    const on=curV==='prj'&&curPrj===p.id;
    return`<div class="proj-row${on?' on':''}" onclick="goProj('${p.id}')">
      <div class="pdot" style="background:${p.col}"></div>
      <span class="pname">${p.nm}</span>
      ${cnt?`<span class="pcnt">${cnt}</span>`:''}
    </div>`;
  }).join('');
}

function tCard(t) {
  const m=TMAP[t.tp]||{l:t.tp,c:'tag-impl'};
  const pn=projs.find(p=>p.id===t.pj);
  const dc=t.st==='Concluído'?'ddn':isLate(t.dt)?'dlate':isSoon(t.dt)?'dsoon':'dok';
  const di=t.st==='Concluído'?'ti-check':isLate(t.dt)?'ti-alert-circle':'ti-calendar';
  const steps=taskSteps(t.id); const cmts=taskCmts(t.id);
  const stsDone=steps.filter(s=>s.dn).length;
  return`<div class="tc${selId===t.id?' sel':''}" onclick="selTask('${t.id}')">
    <div class="tc-top">
      <div class="tc-cb${t.st==='Concluído'?' dn':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">
        ${t.st==='Concluído'?'<i class="ti ti-check" style="font-size:8px;color:#fff"></i>':''}
      </div>
      <div class="tc-nm${t.st==='Concluído'?' dn':''}">${t.nm}</div>
      <span class="chip ${m.c}">${m.l}</span>
    </div>
    <div class="tc-meta">
      <div class="prio-dot pd-${t.pr}" title="Prioridade ${t.pr}"></div>
      ${pn?`<div class="tc-proj-tag"><span class="pdot" style="background:${pn.col}"></span>${pn.nm.split('—')[0].trim()}</div>`:''}
      ${t.dt?`<div class="tc-date ${dc}"><i class="ti ${di}" style="font-size:9px"></i> ${BR(t.dt)}</div>`:''}
      <div class="tc-metas">
        ${cmts.length?`<span class="tc-meta-ic"><i class="ti ti-message-circle"></i>${cmts.length}</span>`:''}
        ${steps.length?`<span class="tc-meta-ic"><i class="ti ti-checklist"></i>${stsDone}/${steps.length}</span>`:''}
        ${t.em?`<span class="tc-meta-ic" title="${t.em}"><i class="ti ti-mail"></i></span>`:''}
      </div>
    </div>
  </div>`;
}

function renderBoard() {
  $('vtog').style.display='flex';
  const list=getFiltered();
  $('content').innerHTML='<div class="board">'+COLS.map((col,ci)=>{
    const items=list.filter(t=>t.st===col);
    return`<div>
      <div class="col-hd"><div class="pdot" style="background:${CDOTS[ci]};width:7px;height:7px;border-radius:50%"></div><span class="col-tt">${col}</span><span class="col-cc">${items.length}</span><span class="col-add" onclick="openMod('task')"><i class="ti ti-plus"></i></span></div>
      <div class="col-body">${items.length?items.map(tCard).join(''):'<div class="empty" style="padding:18px 8px"><i class="ti ti-inbox"></i><div style="font-size:11px">Nenhuma</div></div>'}</div>
    </div>`;
  }).join('')+'</div>';
}

function renderList() {
  $('vtog').style.display='flex';
  const list=getFiltered();
  if(!list.length){$('content').innerHTML='<div class="empty"><i class="ti ti-inbox"></i>Nenhuma tarefa</div>';return;}
  $('content').innerHTML=`<div class="lh"><div>Tarefa</div><div>Projeto</div><div>Data limite</div><div>Tipo</div><div>Status</div><div></div></div>`+
    list.map(t=>{
      const m=TMAP[t.tp]||{l:t.tp,c:'tag-impl'};
      const pn=projs.find(p=>p.id===t.pj);
      const dc=t.st==='Concluído'?'ddn':isLate(t.dt)?'dlate':isSoon(t.dt)?'dsoon':'dok';
      return`<div class="lr" onclick="selTask('${t.id}')">
        <div class="lr-nm">
          <div class="tc-cb${t.st==='Concluído'?' dn':''}" onclick="event.stopPropagation();toggleDone('${t.id}')">
            ${t.st==='Concluído'?'<i class="ti ti-check" style="font-size:8px;color:#fff"></i>':''}
          </div>
          <span style="${t.st==='Concluído'?'text-decoration:line-through;color:var(--text3)':''}">${t.nm}</span>
        </div>
        <div style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)">${pn?`<span class="pdot" style="background:${pn.col}"></span>${pn.nm.split('—')[0].trim()}`:'—'}</div>
        <div class="tc-date ${dc}" style="font-size:11px">${t.dt?`<i class="ti ti-calendar" style="font-size:10px"></i> ${BR(t.dt)}`:'—'}</div>
        <span class="chip ${m.c}">${m.l}</span>
        <div style="font-size:11px;color:var(--text2)">${t.st}</div>
        <div class="prio-dot pd-${t.pr}" style="margin:0 auto"></div>
      </div>`;
    }).join('');
}

function renderGantt() {
  $('vtog').style.display='none';
  const yr=new Date().getFullYear();
  const months=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const yStart=new Date(yr,0,1); const total=(new Date(yr,11,31)-yStart)/86400000+1;
  const pct=d=>{if(!d)return 0;return Math.max(0,Math.min(100,((new Date(d)-yStart)/86400000)/total*100));};
  const todayPct=pct(today);
  const rows=projs.map(p=>{
    const sp=pct(p.st);const ep=pct(p.dt);const w=Math.max(ep-sp,1);
    const pt=tasks.filter(t=>t.pj===p.id);
    const prog=pt.length?Math.round(pt.filter(t=>t.st==='Concluído').length/pt.length*100):0;
    return`<div class="gantt-row">
      <div class="gantt-lbl" onclick="goProj('${p.id}')" title="${p.nm}"><i class="ti ti-folder" style="font-size:11px;margin-right:4px;color:${p.col}"></i>${p.nm}</div>
      <div class="gantt-track">
        <div class="gantt-today" style="left:${todayPct}%"></div>
        <div class="gantt-bar" style="left:${sp}%;width:${w}%;background:${p.col}" title="${p.nm} — ${prog}% concluído">${w>8?prog+'%':''}</div>
      </div>
    </div>`;
  }).join('');
  const trows=tasks.filter(t=>t.dt).map(t=>{
    const tp=pct(t.dt);
    const col={impl:'#4f7cff',prev:'#22c77a',corr:'#ff4f6b',tpm:'#a78bfa',kz:'#f5a623',sens:'#2dd4bf'}[t.tp]||'#4f7cff';
    return`<div class="gantt-row" style="min-height:22px">
      <div class="gantt-lbl" onclick="selTask('${t.id}')" style="font-size:10px" title="${t.nm}"><span style="margin-left:12px;color:var(--text3)">↳</span> ${t.nm}</div>
      <div class="gantt-track" style="height:16px">
        <div class="gantt-today" style="left:${todayPct}%"></div>
        <div class="gantt-bar" style="left:${Math.max(0,tp-.7)}%;width:1.5%;background:${col};border-radius:3px" onclick="selTask('${t.id}')" title="${t.nm} — ${BR(t.dt)}"></div>
      </div>
    </div>`;
  }).join('');
  $('content').innerHTML=`
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap">
      <span style="font-size:13px;font-weight:600">Cronograma ${yr}</span>
      <span style="font-size:10px;color:var(--text3);display:flex;align-items:center;gap:4px"><span style="width:1.5px;height:12px;background:var(--red);display:inline-block"></span>Hoje ${BR(today)}</span>
    </div>
    <div class="gantt-wrap"><div class="gantt-grid">
      <div class="gantt-head">${months.map(m=>`<div class="gantt-month">${m}</div>`).join('')}</div>
      <div style="margin-bottom:12px">
        <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px">Projetos</div>
        ${rows||'<div class="empty" style="padding:16px">Nenhum projeto cadastrado</div>'}
      </div>
      <div>
        <div style="font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.6px;padding:4px 0 8px;border-bottom:1px solid var(--border);margin-bottom:8px">Tarefas</div>
        ${trows||'<div class="empty" style="padding:16px">Nenhuma tarefa com prazo</div>'}
      </div>
    </div></div>`;
}

function renderKPI() {
  $('vtog').style.display='none';
  const done=tasks.filter(t=>t.st==='Concluído').length;
  const total=tasks.length;
  const late=tasks.filter(t=>t.st!=='Concluído'&&isLate(t.dt)).length;
  const totalCost=tasks.reduce((s,t)=>s+(Number(t.cv)||0),0);
  const byType={impl:0,prev:0,corr:0,tpm:0,kz:0,sens:0};
  tasks.forEach(t=>{if(byType[t.tp]!==undefined)byType[t.tp]++;});
  const maxT=Math.max(...Object.values(byType),1);
  const byProj=projs.map(p=>{
    const pt=tasks.filter(t=>t.pj===p.id);
    const pd=pt.filter(t=>t.st==='Concluído').length;
    return{nm:p.nm.split('—')[0].trim(),col:p.col,done:pd,total:pt.length,pct:pt.length?Math.round(pd/pt.length*100):0};
  });
  $('content').innerHTML=`
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-lbl"><i class="ti ti-checklist" style="font-size:12px"></i>Conclusão geral</div><div class="kpi-val kv-b">${total?Math.round(done/total*100):0}%</div><div class="kpi-sub">${done} de ${total} tarefas</div></div>
      <div class="kpi"><div class="kpi-lbl"><i class="ti ti-alert-circle" style="font-size:12px"></i>Atrasadas</div><div class="kpi-val ${late?'kv-r':'kv-g'}">${late}</div><div class="kpi-sub">${late?'requerem atenção':'tudo em dia'}</div></div>
      <div class="kpi"><div class="kpi-lbl"><i class="ti ti-circle-check" style="font-size:12px"></i>Concluídas</div><div class="kpi-val kv-g">${done}</div><div class="kpi-sub">no total</div></div>
      <div class="kpi"><div class="kpi-lbl"><i class="ti ti-currency-dollar" style="font-size:12px"></i>Custo estimado</div><div class="kpi-val kv-a" style="font-size:16px">R$ ${totalCost.toLocaleString('pt-BR')}</div><div class="kpi-sub">soma das tarefas</div></div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px">
      <div class="ind-card">
        <div class="ind-title">Tarefas por tipo</div>
        ${Object.entries(byType).map(([k,v])=>`<div class="hbar-row"><div class="hbar-lbl">${TMAP[k]?.l}</div><div class="hbar-bg"><div class="hbar-fg" style="width:${v/maxT*100}%;background:${{impl:'#4f7cff',prev:'#22c77a',corr:'#ff4f6b',tpm:'#a78bfa',kz:'#f5a623',sens:'#2dd4bf'}[k]}"></div></div><div class="hbar-val">${v}</div></div>`).join('')}
      </div>
      <div class="ind-card">
        <div class="ind-title">Progresso por projeto</div>
        ${byProj.map(p=>`<div class="hbar-row"><div class="hbar-lbl" style="display:flex;align-items:center;gap:4px"><span class="pdot" style="background:${p.col}"></span>${p.nm}</div><div class="hbar-bg"><div class="hbar-fg" style="width:${p.pct}%;background:${p.col}"></div></div><div class="hbar-val">${p.pct}%</div></div>`).join('')||'<div class="empty" style="padding:12px">Sem projetos</div>'}
      </div>
    </div>
    <div class="ind-card">
      <div class="ind-title">Status das tarefas</div>
      <div class="donut-wrap">
        <svg width="100" height="100" viewBox="0 0 100 100">
          ${(()=>{const data=[{v:done,c:'#22c77a'},{v:tasks.filter(t=>t.st==='Em andamento').length,c:'#4f7cff'},{v:tasks.filter(t=>t.st==='A fazer').length,c:'#252d3e'}];const tot=data.reduce((s,d)=>s+d.v,0)||1;let off=0;return data.map(d=>{const dash=d.v/tot*251.2;const svg=`<circle cx="50" cy="50" r="40" fill="none" stroke="${d.c}" stroke-width="16" stroke-dasharray="${dash} ${251.2-dash}" stroke-dashoffset="${-off}" transform="rotate(-90 50 50)"/>`;off+=dash;return svg;}).join('');})()}
          <text x="50" y="55" text-anchor="middle" fill="#e4eaf6" font-size="16" font-weight="700">${total?Math.round(done/total*100):0}%</text>
        </svg>
        <div class="donut-leg">
          ${[{l:'Concluído',v:done,c:'#22c77a'},{l:'Em andamento',v:tasks.filter(t=>t.st==='Em andamento').length,c:'#4f7cff'},{l:'A fazer',v:tasks.filter(t=>t.st==='A fazer').length,c:'#3a4760'}].map(d=>`<div class="donut-li"><div class="donut-dot" style="background:${d.c}"></div>${d.l}<strong style="margin-left:auto">${d.v}</strong></div>`).join('')}
        </div>
      </div>
    </div>`;
}

// ─── DETAIL PANEL ───
function selTask(id) {
  selId=id; $('dp').classList.add('open');
  renderDetail(); render();
}
function closeDP() {
  selId=null; $('dp').classList.remove('open'); render();
}
function renderDetail() {
  const t=tasks.find(x=>x.id===selId); if(!t) return;
  const m=TMAP[t.tp]||{l:t.tp,c:'tag-impl'};
  const pn=projs.find(p=>p.id===t.pj);
  const steps=taskSteps(t.id); const cmts=taskCmts(t.id);
  const stsDone=steps.filter(s=>s.dn).length;
  const prog=steps.length?Math.round(stsDone/steps.length*100):t.st==='Concluído'?100:0;
  const progCol=t.st==='Concluído'?'var(--green)':prog>50?'var(--accent)':'var(--amber)';
  $('d-title').textContent=t.nm;
  $('d-body').innerHTML=`
    <div class="ds">
      <div class="dl">Detalhes</div>
      <div class="dr"><span class="drl">Tipo</span><span class="chip ${m.c}">${m.l}</span></div>
      <div class="dr"><span class="drl">Prioridade</span><span class="drv" style="display:flex;align-items:center;gap:5px"><span class="prio-dot pd-${t.pr}"></span>${{alta:'Alta',media:'Média',baixa:'Baixa'}[t.pr]}</span></div>
      <div class="dr"><span class="drl">Status</span>
        <select class="ssel" onchange="chgSt('${t.id}',this.value)">
          ${COLS.map(s=>`<option${s===t.st?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
      <div class="dr"><span class="drl">Data limite</span><span class="drv ${t.st==='Concluído'?'ddn':isLate(t.dt)?'dlate':isSoon(t.dt)?'dsoon':'dok'}">${BR(t.dt)}</span></div>
      ${pn?`<div class="dr"><span class="drl">Projeto</span><span class="drv" style="display:flex;align-items:center;gap:4px"><span class="pdot" style="background:${pn.col}"></span>${pn.nm}</span></div>`:''}
      <div class="dr"><span class="drl">Equipamento</span><span class="drv">${t.eq||'—'}</span></div>
      ${t.cv?`<div class="dr"><span class="drl">Custo est.</span><span class="drv">${fmt$(t.cv)}</span></div>`:''}
      <div class="dr"><span class="drl">Responsável</span>
        <div style="flex:1">
          ${t.em?`<div class="assign-chip"><i class="ti ti-mail" style="font-size:9px"></i>${t.em}<span class="x" onclick="removeAssign('${t.id}')">×</span></div>`:''}
          <input class="at-input" placeholder="adicionar email..." id="at-${t.id}" onkeydown="if(event.key==='Enter')addAssign('${t.id}')">
        </div>
      </div>
      <div class="dr"><span class="drl">Progresso</span>
        <div style="display:flex;align-items:center;gap:6px;flex:1">
          <div class="prog-bg"><div class="prog-fg" style="width:${prog}%;background:${progCol}"></div></div>
          <span style="font-size:10px;color:var(--text3)">${prog}%</span>
        </div>
      </div>
    </div>
    ${t.ds?`<div class="ds"><div class="dl">Descrição</div><div style="font-size:12px;color:var(--text2);line-height:1.6">${t.ds}</div></div>`:''}
    <div class="ds">
      <div class="dl">Etapas <span style="font-weight:400;color:var(--text3)">${stsDone}/${steps.length}</span></div>
      <div id="steps-wrap">
        ${steps.map(s=>`<div class="step-item">
          <div class="step-cb${s.dn?' dn':''}" onclick="toggleStep('${s.id}','${t.id}')">
            ${s.dn?'<i class="ti ti-check" style="font-size:8px;color:#fff"></i>':''}
          </div>
          <span class="step-txt${s.dn?' dn':''}">${s.txt}</span>
          <span class="step-del" onclick="delStep('${s.id}','${t.id}')"><i class="ti ti-x"></i></span>
        </div>`).join('')}
      </div>
      <div style="display:flex;gap:6px;margin-top:6px">
        <input id="step-in" placeholder="Nova etapa..." style="flex:1;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--text);font-family:inherit;font-size:11px;padding:5px 8px;outline:none" onkeydown="if(event.key==='Enter')addStep('${t.id}')">
        <button class="btn sm" onclick="addStep('${t.id}')"><i class="ti ti-plus"></i></button>
      </div>
    </div>
    <div class="ds">
      <div class="dl">Comentários ${cmts.length?`(${cmts.length})`:''}</div>
      ${cmts.length?cmts.map(c=>`<div class="cmt">
        <div class="ava ava-sm">${c.autor.substring(0,2).toUpperCase()}</div>
        <div class="cbubble">
          <div><span class="cname">${c.autor}</span><span class="ctime">${new Date(c.created_at).toLocaleString('pt-BR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'})}</span></div>
          <div class="ctxt">${c.tx}</div>
        </div>
      </div>`).join(''):'<div style="font-size:11px;color:var(--text3);padding:2px 0">Nenhum comentário.</div>'}
    </div>`;
}

// ─── ACTIONS ───
async function toggleDone(id) {
  const t=tasks.find(x=>x.id===id); if(!t) return;
  const ns=t.st==='Concluído'?'A fazer':'Concluído';
  const {error}=await sb.from('tarefas').update({st:ns}).eq('id',id);
  if(error){toast('Erro ao salvar','ti-alert-circle','var(--red)');return;}
  t.st=ns;
  if(selId===id) renderDetail();
  render(); toast('Tarefa atualizada','ti-check','var(--green)');
}

async function chgSt(id,val) {
  const {error}=await sb.from('tarefas').update({st:val}).eq('id',id);
  if(error){toast('Erro ao salvar','ti-alert-circle','var(--red)');return;}
  const t=tasks.find(x=>x.id===id); if(t) t.st=val;
  renderDetail(); render(); toast('Status: '+val,'ti-refresh','var(--accent)');
}

async function toggleStep(sid,tid) {
  const s=etapas.find(x=>x.id===sid); if(!s) return;
  const {error}=await sb.from('etapas').update({dn:!s.dn}).eq('id',sid);
  if(error){toast('Erro','ti-alert-circle','var(--red)');return;}
  s.dn=!s.dn; renderDetail(); render();
}

async function delStep(sid,tid) {
  await sb.from('etapas').delete().eq('id',sid);
  etapas=etapas.filter(x=>x.id!==sid); renderDetail();
}

async function addStep(tid) {
  const inp=$('step-in'); if(!inp||!inp.value.trim()) return;
  const txt=inp.value.trim();
  const ordem=etapas.filter(e=>e.tarefa_id===tid).length;
  const {data,error}=await sb.from('etapas').insert({tarefa_id:tid,txt,dn:false,ordem}).select().single();
  if(error||!data){toast('Erro ao salvar etapa','ti-alert-circle','var(--red)');return;}
  etapas.push(data); inp.value=''; renderDetail(); render();
}

async function addAssign(id) {
  const inp=$(`at-${id}`); if(!inp) return;
  const email=inp.value.trim();
  if(!/\S+@\S+/.test(email)){toast('E-mail inválido','ti-alert-circle','var(--red)');return;}
  const {error}=await sb.from('tarefas').update({em:email}).eq('id',id);
  if(error){toast('Erro ao salvar','ti-alert-circle','var(--red)');return;}
  const t=tasks.find(x=>x.id===id); if(t) t.em=email;
  inp.value=''; renderDetail(); render();
  toast(`Responsável atribuído: ${email}`,'ti-mail','var(--green)');
}

async function removeAssign(id) {
  const {error}=await sb.from('tarefas').update({em:''}).eq('id',id);
  if(error) return;
  const t=tasks.find(x=>x.id===id); if(t) t.em='';
  renderDetail(); render();
}

async function addCmt() {
  const inp=$('cin'); const txt=inp.value.trim();
  if(!txt||!selId) return;
  const {data,error}=await sb.from('comentarios').insert({tarefa_id:selId,autor:'EP',tx:txt}).select().single();
  if(error||!data){toast('Erro ao salvar comentário','ti-alert-circle','var(--red)');return;}
  comentarios.push(data); inp.value=''; renderDetail();
}

// ─── NAV ───
function go(v) {
  curV=v; curPrj=null;
  ['inbox','hoje','atras','gantt','kpi','done'].forEach(x=>{const el=$('n-'+x);if(el)el.classList.toggle('on',x===v);});
  document.querySelectorAll('.proj-row').forEach(el=>el.classList.remove('on'));
  const titles={inbox:'Caixa de entrada',hoje:'Hoje',atras:'Atrasadas',gantt:'Cronograma anual',kpi:'Indicadores',done:'Concluídas'};
  $('pg-title').textContent=titles[v]||v;
  render();
}
function goProj(id) {
  curV='prj'; curPrj=id;
  ['inbox','hoje','atras','gantt','kpi','done'].forEach(x=>{const el=$('n-'+x);if(el)el.classList.remove('on');});
  const p=projs.find(x=>x.id===id);
  $('pg-title').textContent=p?p.nm:'Projeto';
  render();
}
function setLay(l) {
  curLay=l; $('vt-b').classList.toggle('on',l==='board'); $('vt-l').classList.toggle('on',l==='list'); render();
}
function doSearch(q){srch=q;render();}

// ─── MODALS ───
let modalStepsList=[];
function openMod(type) {
  $('ov-'+type).classList.remove('hid');
  if(type==='task'){
    const sel=$('nt-pj');
    sel.innerHTML='<option value="">— Sem projeto —</option>'+projs.map(p=>`<option value="${p.id}">${p.nm}</option>`).join('');
    if(curPrj) sel.value=curPrj;
    if(!$('nt-dt').value) $('nt-dt').value=today;
    modalStepsList=[]; $('nt-steps-wrap').innerHTML='';
  }
  if(type==='proj'){
    if(!$('np-dt').value) $('np-dt').value=D(90);
    if(!$('np-st').value) $('np-st').value=today;
  }
}
function closeMod(type){$('ov-'+type).classList.add('hid');}

function addModalStep() {
  const inp=$('nt-step-in'); if(!inp.value.trim()) return;
  modalStepsList.push(inp.value.trim()); inp.value='';
  $('nt-steps-wrap').innerHTML=modalStepsList.map((s,i)=>`
    <div style="display:flex;align-items:center;gap:6px;padding:5px 0;border-bottom:1px solid var(--border)">
      <i class="ti ti-grip-vertical" style="color:var(--text3);font-size:11px"></i>
      <span style="flex:1;font-size:11px">${s}</span>
      <span onclick="modalStepsList.splice(${i},1);$('nt-steps-wrap').innerHTML='';modalStepsList.forEach((_,j)=>{});" style="cursor:pointer;color:var(--text3)"><i class="ti ti-x"></i></span>
    </div>`).join('');
}

async function saveTask() {
  const nm=$('nt-nm').value.trim(); if(!nm){toast('Informe o título','ti-alert-circle','var(--red)');return;}
  const pjVal=$('nt-pj').value;
  const payload={nm,tp:$('nt-tp').value,pr:$('nt-pr').value,pj:pjVal||null,eq:$('nt-eq').value,dt:$('nt-dt').value||null,ds:$('nt-ds').value,em:$('nt-em').value,cv:parseFloat($('nt-cv').value)||0,st:'A fazer'};
  const {data,error}=await sb.from('tarefas').insert(payload).select().single();
  if(error||!data){toast('Erro ao criar tarefa','ti-alert-circle','var(--red)');return;}
  tasks.push(data);
  // salvar etapas
  if(modalStepsList.length){
    const steps=modalStepsList.map((txt,i)=>({tarefa_id:data.id,txt,dn:false,ordem:i}));
    const {data:sd}=await sb.from('etapas').insert(steps).select();
    if(sd) etapas.push(...sd);
  }
  ['nt-nm','nt-ds','nt-em','nt-cv'].forEach(id=>{const el=$(id);if(el)el.value='';});
  modalStepsList=[]; $('nt-steps-wrap').innerHTML='';
  closeMod('task'); render();
  toast('Tarefa criada!','ti-check','var(--green)');
  if(payload.em) toast(`Notificação enviada para ${payload.em}`,'ti-mail','var(--accent)');
}

async function saveProj() {
  const nm=$('np-nm').value.trim(); if(!nm){toast('Informe o nome','ti-alert-circle','var(--red)');return;}
  const col=PCOLS[projs.length%PCOLS.length];
  const payload={nm,ct:$('np-ct').value,st:$('np-st').value||null,dt:$('np-dt').value||null,ds:$('np-ds').value,col,bgt:parseFloat($('np-bgt').value)||0};
  const {data,error}=await sb.from('projetos').insert(payload).select().single();
  if(error||!data){toast('Erro ao criar projeto','ti-alert-circle','var(--red)');return;}
  projs.push(data);
  ['np-nm','np-ds','np-bgt'].forEach(id=>{const el=$(id);if(el)el.value='';});
  closeMod('proj'); render();
  toast('Projeto criado!','ti-folder','var(--accent)');
}

// ─── TOAST ───
function toast(msg,icon='ti-check',color='var(--green)') {
  const el=document.createElement('div');
  el.className='toast';
  el.innerHTML=`<i class="ti ${icon}" style="color:${color};font-size:15px"></i>${msg}`;
  $('ta').appendChild(el);
  setTimeout(()=>{el.classList.add('go');setTimeout(()=>el.remove(),300);},3000);
}

// INIT
loadAll();
</script>
</body>
</html>
